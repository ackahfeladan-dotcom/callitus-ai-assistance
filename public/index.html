   .chips-container {

/* Container framework mimicking a real IDE explorer */

}

.tree-node:hover {
    background: #2a2a30;
    color: #ffffff;
}

    color: #e2b34a;

}

.tree-node.file {
    color: #8da6ff;
}

.tree-node.file::before { content: "📄"; font-size: 11px; }

<body>

    <!-- Left Sidebar Panel -->
    <div id="sidebar">
    <button class="new-chat-btn" id="new-chat-btn" onclick="clearChat()">+ New chat</button>
        <div class="brand-box">

    <!-- Main Window Area -->

        <div id="chat-container">

<script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // Inject clean, modern ChatGPT typography styles directly into the document
    if (!document.getElementById('chatgpt-ui-styles')) {
        const styleTag = document.createElement('style');
        styleTag.id = 'chatgpt-ui-styles';
        styleTag.innerHTML = `
            /* ChatGPT Text Formatting Layouts */
            .message-content p { margin-bottom: 16px; line-height: 1.6; color: #ececf1; }
            .message-content p:last-child { margin-bottom: 0; }
            .message-content strong { color: #ffffff; font-weight: 600; }
            
            /* Clean Lists Layout */
            .message-content ol, .message-content ul { margin: 8px 0 16px 24px; line-height: 1.6; color: #ececf1; }
            .message-content li { margin-bottom: 6px; }
            .message-content li strong { color: #ffffff; }

            /* Premium Dark ChatGPT Code Blocks */
            .message-content pre { background-color: #0d0d0d; border: 1px solid #2f2f2f; border-radius: 8px; margin: 16px 0; overflow: hidden; font-family: monospace; text-align: left; }
            .message-content code { font-family: 'Courier New', Courier, monospace; background-color: rgba(255,255,255,0.1); padding: 2px 5px; border-radius: 4px; font-size: 14px; color: #f2f2f2; }
            .message-content pre code { display: block; padding: 14px; overflow-x: auto; background-color: transparent; font-size: 13px; line-height: 1.5; white-space: pre; }
        `;
        document.head.appendChild(styleTag);
    }

    // Configure marked options to replicate standard markdown behaviors
    if (typeof marked !== 'undefined' && marked.setOptions) {
        marked.setOptions({ gfm: true, breaks: true });
    }

    // State memory array tracking conversation turns
    let chatHistory = [];

    // Safe, robust translation engine to render markup layouts
    function renderChatGPTLayout(rawText) {
        if (!rawText) return "";
        try {
            if (typeof marked !== 'undefined' && typeof marked.parse === 'function') {
                return marked.parse(rawText);
            }
        } catch (e) {
            console.error("Layout engine warning:", e);
        }
        // Secure text backup formatting fallback if parser breaks down
        return rawText.replace(/\n/g, '<br>').replace(/\\(.?)\\*/g, '<strong>$1</strong>');
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        userInput.value = '';

        // Render user query on the right side
        appendRow(renderChatGPTLayout(text), 'user-wrapper', 'user-content', 'You');

        // Append temporary streaming row on the left side
        const aiContentElement = appendRow('', 'ai-wrapper', 'ai-content', 'Assistant');

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, history: chatHistory })
            });

            if (!response.ok) throw new Error("Backend route non-responsive");

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let accumulatedAiResponse = "";

while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const dataStr = line.replace('data: ', '').trim();
          if (dataStr === '[DONE]') break;

          try {
            const parsed = JSON.parse(dataStr);
            if (parsed.text) {
              accumulatedAiResponse += parsed.text;
            }
          } catch (e) {
            accumulatedAiResponse += dataStr;
          }
        } else if (!line.startsWith('data:') && line.trim()) {
          accumulatedAiResponse += line;
        }
      }

     
      aiContentElement.innerHTML = `
        <span class="avatar-label" style="display: block; font-weight: bold; margin-bottom: 6px; color: #888;">Assistant</span>
        <div style="line-height: 1.6; color: #e3e3e3; white-space: pre-wrap; word-break: break-word;">${formattedText}</div>
      `;
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // --- 1. INITIALIZE ACCUMULATED STREAM TEXT DATA ---
    let mainContent = accumulatedAiResponse;
            
            // --- ADVANCED BLUEPRINT CONSTRUCT INTERCEPTOR ---
 if (accumulatedAiResponse.includes("└──") || accumulatedAiResponse.includes("├──") || accumulatedAiResponse.toUpperCase().includes("FILETREE")) {

    // 2. Locate the start index position cleanly based on what is present
    let startIdx = accumulatedAiResponse.toUpperCase().indexOf("FILETREE");
    if (startIdx !== -1) {
        startIdx = startIdx - 1; // Align to tag brace layout position if present
    } else {
        // Fallback: If no tag exists, target the very first structural branch row layout line position
        startIdx = accumulatedAiResponse.search(/[├──└──│]/);
    }
            const endIdx = accumulatedAiResponse.indexOf("]", startIdx);
            
            if (endIdx !== -1) {
                const treeText = accumulatedAiResponse.substring(startIdx + 10, endIdx).trim();
                accumulatedAiResponse = accumulatedAiResponse.substring(0, startIdx) + accumulatedAiResponse.substring(endIdx + 1);

                const treeBox = document.createElement("div");
                treeBox.className = "file-tree-container";
                treeBox.innerHTML = `
                    <div class="file-tree-header">📁 Project Workspace Blueprints</div>
                    <div class="file-tree-body" id="tree-root-target"></div>
                `;
                chatContainer.appendChild(treeBox);
                const targetRoot = treeBox.querySelector("#tree-root-target");

                const lines = treeText.split("\n").filter(l => l.trim());
                let currentContainer = targetRoot;
                let containerStack = [targetRoot];
                let depthStack = [-1];

                lines.forEach(line => {
                    const indentMatch = line.match(/^[\s│├──└──]+/);
                    const depth = indentMatch ? indentMatch.length : 0;
                    const cleanName = line.replace(/^[\s│├──└──]+/, "").trim();
                    const isFolder = cleanName.endsWith("/");
                    const displayName = isFolder ? cleanName.slice(0, -1) : cleanName;

                    while (depthStack.length > 1 && depth <= depthStack[depthStack.length - 1]) {
                        depthStack.pop();
                        containerStack.pop();
                    }
                    currentContainer = containerStack[containerStack.length - 1];

                    const node = document.createElement("div");
                    node.className = `tree-node ${isFolder ? 'folder open' : 'file'}`;
                    node.innerText = displayName;

                    currentContainer.appendChild(node);

                    if (isFolder) {
                        const childWrapper = document.createElement("div");
                        childWrapper.className = "tree-children";
                        currentContainer.appendChild(childWrapper);

                        node.addEventListener("click", (e) => {
                            e.stopPropagation();
                            node.classList.toggle("open");
                            childWrapper.classList.toggle("collapsed");
                        });

                        containerStack.push(childWrapper);
                        depthStack.push(depth);
                    } else {
                        node.addEventListener("click", (e) => {
                            e.stopPropagation();
                            const textInput = document.querySelector('.input-area-container input') || document.querySelector('input');
                            if (textInput) {
                                textInput.value = `Write the code boilerplate implementation for file: ${displayName}`;
                                const sendBtn = document.querySelector('.input-area-container button') || document.querySelector('button');
                                if (sendBtn) sendBtn.click();
                            }
                        });
                    }
                });
            }
        }
// 2. High-Fidelity Plain Text Document Processor
    let cleanText = accumulatedAiResponse;
    
    // Normalize string-escaped newline characters securely
    while (cleanText.includes("\\n")) {
      cleanText = cleanText.replace("\\n", "\n");
    }

    let paragraphs = cleanText.split("\n");
    let parsedHTML = "";

    paragraphs.forEach(function(p) {
      let line = p.trim();
      if (!line) return;

      // Formats Double Hashtag Headers into clean titles
      if (line.startsWith("## ")) {
        let cleanHeader = line.replace("## ", "");
        parsedHTML += '<h2 style="margin: 20px 0 8px 0; font-size: 1.4rem; color: #ffffff; font-weight: 700; display: block;">' + cleanHeader + '</h2>';
      }
      // Formats Triple Hashtag Headers into clean subtitles
      else if (line.startsWith("### ")) {
        let cleanHeader = line.replace("### ", "");
        parsedHTML += '<h3 style="margin: 18px 0 6px 0; font-size: 1.25rem; color: #ffffff; font-weight: 600; border-bottom: 1px solid #2f2f2f; padding-bottom: 4px; display: block;">' + cleanHeader + '</h3>';
      } 
      // Formats Bullet items into beautifully indented rows
      else if (line.startsWith("- ") || line.startsWith("* ")) {
        let cleanItem = line.substring(2);
        parsedHTML += '<li style="margin: 6px 0 6px 20px; color: #e3e3e3; list-style-type: disc; display: list-item;">' + cleanItem + '</li>';
      } 
      // Standard paragraph text block handling
      else {
        let processedLine = line;
        while (processedLine.includes("**")) {
          processedLine = processedLine.replace("*", '<strong style="color: #ffffff; font-weight: 600;">').replace("*", "</strong>");
        }
        parsedHTML += '<p style="margin: 0 0 12px 0; line-height: 1.7; color: #e3e3e3; font-size: 0.95rem; display: block;">' + processedLine + '</p>';
      }
    });


    // 3. Inject the beautifully structured document layout directly into the chat element container
    aiContentElement.innerHTML = `
      <span class="avatar-label" style="display: block; font-weight: bold; margin-bottom: 10px; color: #aaa; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;">Assistant</span>
      <div class="premium-document-layout" style="word-break: break-word;">${parsedHTML}</div>
    `;
        let suggestions = [];
// --- SMART TEXT KANBAN PARSING LOGIC ---
        if (mainContent.includes("To Do") || mainContent.includes("To-Do")) {
            // Extract everything from "To Do" onwards
            const todoIndex = mainContent.indexOf("To Do");
            const kanbanText = mainContent.substring(todoIndex);
            
            // Clean up the text displayed on screen by cutting off the raw list text
            mainContent = mainContent.substring(0, todoIndex).trim();
            aiContentElement.innerHTML = `<span class="avatar-label">Assistant</span>${mainContent}`;

            // Parse individual lines into a clean array of tasks
            const lines = kanbanText.split('\n').map(l => l.trim()).filter(Boolean);
            let tasks = [];
            
            // Collect any bullet points or lines that belong under the "To Do" section
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                if (line.includes("In Progress") || line.includes("Done")) break;
                
                // Strip out markdown list markers like -, *, or 1.
                const cleanTask = line.replace(/^[\s*\-\d\.\/]+/, '').trim();
                if (cleanTask) tasks.push(cleanTask);
            }

            // Construct the Kanban Board DOM structure layout directly
            if (tasks.length > 0) {
                const board = document.createElement("div");
                board.className = "kanban-board";
                board.innerHTML = `
                    <div class="kanban-column"><h4 style="color:#ff4a4a">To Do</h4><div class="kanban-task-list" id="todo-list"></div></div>
                    <div class="kanban-column"><h4 style="color:#ffb700">In Progress</h4><div class="kanban-task-list" id="progress-list"></div></div>
                    <div class="kanban-column"><h4 style="color:#00cc66">Done</h4><div class="kanban-task-list" id="done-list"></div></div>
                `;
                chatContainer.appendChild(board);

                const todoList = board.querySelector("#todo-list");
                tasks.forEach((taskText, index) => {
                    const card = document.createElement("div");
                    card.className = "kanban-card";
                    card.draggable = true;
                    card.id = `task-${Date.now()}-${index}`;
                    card.innerText = taskText;

                    card.addEventListener("dragstart", (e) => e.dataTransfer.setData("text/plain", card.id));
                    todoList.appendChild(card);
                });

                board.querySelectorAll(".kanban-task-list").forEach(list => {
                    list.addEventListener("dragover", (e) => e.preventDefault());
                    list.addEventListener("drop", (e) => {
                        e.preventDefault();
                        const cardId = e.dataTransfer.getData("text/plain");
                        const draggedCard = document.getElementById(cardId);
                        if (draggedCard) list.appendChild(draggedCard);
                    });
                });
            }
        }

        // --- 3. RUN ACTION CHIPS PROTOCOL PARSING SECOND ---
        if (mainContent.includes("|||")) {
            const chipParts = mainContent.split("|||");
            mainContent = chipParts[0].trim();
            const chipsSection = chipParts[1] || "";
            if (chipsSection) {
                suggestions = chipsSection.split("|").map(s => s.trim()).filter(Boolean);
            }
        }

        // Update the visible AI text window box dynamically with cleaned text
        aiContentElement.innerHTML = `<span class="avatar-label" style="display: block; font-weight: bold; margin-bottom: 6px; color: #fff;">Assistant</span>${marked.parse(mainContent)}`;

        // Render Action Buttons underneath
        const oldChips = document.querySelector(".chips-container");
        if (oldChips) oldChips.remove();

        if (suggestions.length > 0) {
            const chipsContainer = document.createElement("div");
            chipsContainer.className = "chips-container";

            suggestions.forEach(text => {
                const chip = document.createElement("button");
                chip.className = "suggestion-chip";
                chip.innerText = text;

                chip.addEventListener("click", () => {
                    const textInput = document.querySelector('.input-area-container input') || document.querySelector('input');
                    if (textInput) {
                        textInput.value = text;
                        const sendBtn = document.querySelector('.input-area-container button') || document.querySelector('button');
                        if (sendBtn) sendBtn.click();
                    }
                    chipsContainer.remove();
                });

                chipsContainer.appendChild(chip);
            });

            chatContainer.appendChild(chipsContainer);
        }

        // Clean scrolling layout alignment
        chatContainer.scrollTop = chatContainer.scrollHeight;

        // --- 4. SECURE MEMORY SYNC LOGIC ---
        
      chatHistory.push({ role: "assistant", text: mainContent });


        } catch (error) {
            console.error("Critical core messaging flow crash:", error);
            aiContentElement.innerHTML = '<span class="avatar-label">Assistant</span>Failed to stream responses. Please try again.';
        }
    }

    function appendRow(htmlContent, wrapperClass, contentClass, userLabel) {
        const wrapperDiv = document.createElement('div');
        wrapperDiv.className = `chat-wrapper ${wrapperClass}`;

        const contentDiv = document.createElement('div');
        contentDiv.className = `message-content ${contentClass}`;
        contentDiv.innerHTML = `<span class="avatar-label">${userLabel}</span>${htmlContent}`;

        wrapperDiv.appendChild(contentDiv);
        chatContainer.appendChild(wrapperDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return contentDiv;
    }

    function clearChat() {
    // Target the main chat container visible on line 56
    const container = document.getElementById('chat-container');
    
    // Clear everything inside out
    container.innerHTML = `
        <div class="chat-wrapper ai-wrapper">
            <div class="message-content ai-content">
                <span class="avatar-label">Assistant</span>Hello! How can I assist you with your project today?
            </div>
        </div>
    `;
    
    // Optional: Notify the backend server to wipe history if it tracks context
    fetch('/api/clear', { method: 'POST' })
        .then(() => console.log('Backend conversation history cleared'))
        .catch(err => console.error('Error clearing history:', err));
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    // ==========================================
// STANDALONE FILE TREE VISUALIZER HELPER
// ==========================================
function renderVisualFileTree(rawResponseText, targetBubbleElement) {
    // Only activate if the text contains actual file tree branch icons
    if (!rawResponseText.includes("├──") && !rawResponseText.includes("└──")) return;

    try {
        const lines = rawResponseText.split("\n");
        
        // 1. Isolate only the rows that look like folder paths or branch shapes
        const treeLines = lines.filter(line => line.includes("├──") || line.includes("└──") || line.includes("│") || line.trim().endsWith("/"));
        if (treeLines.length === 0) return;

        // 2. Filter out those layout lines from the original text bubble view
        const cleanBodyText = lines.filter(line => !line.includes("├──") && !line.includes("└──") && !line.includes("│") && !line.trim().endsWith("/")).join("\n").trim();
        
        // Clean the main chat bubble layout window so it stays tidy
        targetBubbleElement.innerHTML = `<span class="avatar-label">Assistant</span>${cleanBodyText}`;

        // 3. Construct the workspace tree box
        const treeBox = document.createElement("div");
        treeBox.className = "file-tree-container";
        treeBox.innerHTML = `
            <div class="file-tree-header">📁 Project Workspace Blueprints</div>
            <div class="file-tree-body" id="dynamic-tree-target"></div>
        `;
        
        // Append it cleanly underneath the message text inside your chat window box
        const chatContainer = document.getElementById("chat-container");
        if (chatContainer) {
            chatContainer.appendChild(treeBox);
            const targetRoot = treeBox.querySelector("#dynamic-tree-target");

            // 4. Generate the nested elements inside the box row by row
            treeLines.forEach(line => {
                const cleanName = line.replace(/^[\s│├──└───\s\-]+/, "").trim();
                const isFolder = line.trim().endsWith("/");
                const displayName = isFolder ? cleanName.slice(0, -1) : cleanName;

                if (displayName) {
                    const node = document.createElement("div");
                    node.className = `tree-node ${isFolder ? 'folder open' : 'file'}`;
                    node.innerText = displayName;
                    targetRoot.appendChild(node);
                }
            });
            
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    } catch (err) {
        console.error("Visual tree rendering fallback skipped:", err);
    }
}
</script>
</body>
</html>
