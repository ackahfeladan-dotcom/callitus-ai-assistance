// STANDALONE FILE TREE VISUALIZER HELPER

function renderVisualFileTree(rawResponseText, targetBubbleElement) {
    // Only activate if the text contains actual file tree branch icons
    if (!rawResponseText.includes("├──") && !rawResponseText.includes("└──")) return;

    try {
        const lines = rawResponseText.split("\n");
        
        // 1. Isolate only the rows that look like folder paths or branch shapes
        const treeLines = lines.filter(line => line.includes("├──") || line.includes("└──") || line.includes("│") || line.trim().endsWith("/"));
        if (treeLines.length === 0) return;

        // 2. Filter out those layout lines from the original text bubble view
        const cleanBodyText = lines.filter(line => !line.includes("├──") && !line.includes("└──") && !line.includes("│") && !line.trim().endsWith("/")).join("\n").trim();
        
        // Clean the main chat bubble layout window so it stays tidy
        targetBubbleElement.innerHTML = `<span class="avatar-label">Assistant</span>${cleanBodyText}`;

        // 3. Construct the workspace tree box
        const treeBox = document.createElement("div");
        treeBox.className = "file-tree-container";
        treeBox.innerHTML = `
            <div class="file-tree-header">📁 Project Workspace Blueprints</div>
            <div class="file-tree-body" id="dynamic-tree-target"></div>
        `;
        
        // Append it cleanly underneath the message text inside your chat window box
        const chatContainer = document.getElementById("chat-container");
        if (chatContainer) {
            chatContainer.appendChild(treeBox);
            const targetRoot = treeBox.querySelector("#dynamic-tree-target");

            // 4. Generate the nested elements inside the box row by row
            treeLines.forEach(line => {
                const cleanName = line.replace(/^[\s│├──└───\s\-]+/, "").trim();
                const isFolder = line.trim().endsWith("/");
                const displayName = isFolder ? cleanName.slice(0, -1) : cleanName;

                if (displayName) {
                    const node = document.createElement("div");
                    node.className = `tree-node ${isFolder ? 'folder open' : 'file'}`;
                    node.innerText = displayName;
                    targetRoot.appendChild(node);
                }
            });
            
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    } catch (err) {
        console.error("Visual tree rendering fallback skipped:", err);
    }
}

// 1. UNIVERSAL COPY-TO-CLIPBOARD FUNCTIONALITY
// ==========================================
document.addEventListener('click', async (e) => {
    if (e.target.classList.contains('code-copy-btn') || e.target.closest('.code-copy-btn')) {
        const button = e.target.classList.contains('code-copy-btn') ? e.target : e.target.closest('.code-copy-btn');
        const preBlock = button.closest('pre');
        const codeBlock = preBlock ? preBlock.querySelector('code') : null;
        
        if (codeBlock) {
            try {
                await navigator.clipboard.writeText(codeBlock.innerText);
                const originalText = button.innerHTML;
                button.innerHTML = '✓ Copied';
                button.style.backgroundColor = '#10b981';
                
                setTimeout(() => {
                    button.innerHTML = originalText;
                    button.style.backgroundColor = '';
                }, 2000);
            } catch (err) {
                console.error('Failed to copy text: ', err);
            }
        }
    }
});

function saveMessageToHistory(role, text) {

function renderHistoryList() {

    conversationThreads.forEach(thread => {

        item.style.borderRadius = '8px';
        item.style.cursor = 'pointer';
        item.style.fontSize = '14px';
        item.style.color = '#c4c7c5';
        item.style.whiteSpace = 'nowrap';
        item.style.overflow = 'hidden';
        item.style.textOverflow = 'ellipsis';
        item.style.transition = 'background-color 0.2s';
        
        if (thread.id === currentThreadId) {
            item.style.backgroundColor = '#2d2f31';

        item.addEventListener('mouseenter', () => item.style.backgroundColor = '#232425');

        listContainer.appendChild(item);
    });
}

function saveChatToHistory(firstMessageText) {
  let history = JSON.parse(localStorage.getItem('my_chat_history')) || [];
  let chatTitle = firstMessageText.length > 25 ? firstMessageText.substring(0, 25) + '...' : firstMessageText;
  
  // Check if this chat title already exists in history
  let exists = history.some(item => item.title === chatTitle);
  
  if (!exists) {
    // Save an object containing the title and an identifier for its unique message history array
    history.unshift({
      id: Date.now().toString(), // unique timestamp ID
      title: chatTitle
    });
    localStorage.setItem('my_chat_history', JSON.stringify(history));
  }
  
  renderSidebarHistory();
}
function renderSidebarHistory() {
  const container = document.getElementById('chat-history-list');
  if (!container) return;
  
  container.innerHTML = '';
  let history = JSON.parse(localStorage.getItem('my_chat_history')) || [];
  
  history.forEach(item => {
    const historyItem = document.createElement('div');
    historyItem.className = 'history-item';
    
    // FIX: If the item is just text, use it. If it's an object, use item.title.
    let displayTitle = (typeof item === 'object' && item !== null) ? item.title : item;
    
    // Skip rendering if something goes wrong or text is blank
    if (!displayTitle) return;
    
    historyItem.innerText = displayTitle;
    
    historyItem.onclick = function() {
      const chatContainer = document.getElementById('chat-container');
      if (chatContainer) chatContainer.innerHTML = '';
      alert("Opening chat: " + displayTitle);
    };
    
    container.appendChild(historyItem);
  });
}
